x-env: &env
  APP_KEY: ${APP_KEY}
  APP_ENV: ${APP_ENV}
  APP_DEBUG: ${APP_DEBUG}
  APP_URL: ${APP_URL}
  DB_CONNECTION: ${DB_CONNECTION:-mysql}
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT:-3306}
  DB_DATABASE: ${DB_DATABASE}
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  CACHE_DRIVER: ${CACHE_DRIVER:-file}
  SESSION_DRIVER: ${SESSION_DRIVER:-file}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
  LOG_CHANNEL: ${LOG_CHANNEL:-stack}

services:
  app:
    build:
      context: ./ecommerce
      dockerfile: Dockerfile
    container_name: eskytrips_app
    restart: unless-stopped
    environment:
      <<: *env
      RUN_MIGRATIONS: "true"
    ports:
      - "20180:8080"
    volumes:
      - storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health.php"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - eskytrips
      - dokploy-network

  queue:
    build:
      context: ./ecommerce
      dockerfile: Dockerfile
    container_name: eskytrips_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      <<: *env
    healthcheck:
      disable: true
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    networks:
      - eskytrips
      - dokploy-network

  scheduler:
    build:
      context: ./ecommerce
      dockerfile: Dockerfile
    container_name: eskytrips_scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    environment:
      <<: *env
    healthcheck:
      disable: true
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    networks:
      - eskytrips
      - dokploy-network

networks:
  eskytrips:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  storage:
  bootstrap_cache:
