services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eskytrips_app
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "80:80"
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      - mysql
      - redis
    networks:
      - eskytrips

  mysql:
    image: mysql:8.0
    container_name: eskytrips_mysql
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - eskytrips

  redis:
    image: redis:7-alpine
    container_name: eskytrips_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - eskytrips

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eskytrips_queue
    restart: unless-stopped
    env_file:
      - .env.production
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      - mysql
      - redis
    networks:
      - eskytrips

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eskytrips_scheduler
    restart: unless-stopped
    env_file:
      - .env.production
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      - mysql
      - redis
    networks:
      - eskytrips

networks:
  eskytrips:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
