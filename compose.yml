x-env: &env
  APP_KEY: ${APP_KEY}
  APP_ENV: ${APP_ENV}
  APP_DEBUG: ${APP_DEBUG}
  APP_URL: ${APP_URL}
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-eskytrips_db}
  DB_USERNAME: ${DB_USERNAME:-eskytrips_db}
  DB_PASSWORD: ${DB_PASSWORD:-eskytrips_db}
  CACHE_DRIVER: ${CACHE_DRIVER:-file}
  SESSION_DRIVER: ${SESSION_DRIVER:-file}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
  LOG_CHANNEL: ${LOG_CHANNEL:-stack}

services:
  postgres:
    image: postgres:18-alpine
    container_name: eskytrips_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-eskytrips_db}
      POSTGRES_USER: ${DB_USERNAME:-eskytrips_db}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eskytrips_db}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-eskytrips_db} -d ${DB_DATABASE:-eskytrips_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eskytrips

  app:
    build:
      context: ./ecommerce
      dockerfile: Dockerfile
    container_name: eskytrips_app
    restart: unless-stopped
    environment:
      <<: *env
      RUN_MIGRATIONS: "true"
    ports:
      - "20180:8080"
    volumes:
      - storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health.php"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eskytrips

  queue:
    build:
      context: ./ecommerce
      dockerfile: Dockerfile
    container_name: eskytrips_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      <<: *env
      SERVICE_NAME: queue
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    networks:
      - eskytrips

  scheduler:
    build:
      context: ./ecommerce
      dockerfile: Dockerfile
    container_name: eskytrips_scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    environment:
      <<: *env
      SERVICE_NAME: scheduler
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    networks:
      - eskytrips

networks:
  eskytrips:
    driver: bridge

volumes:
  storage:
  bootstrap_cache:
  postgres_data:
