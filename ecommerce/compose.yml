services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eskytrips_app
    restart: unless-stopped
    ports:
      - "20180:20180"
    volumes:
      - storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:20180/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - eskytrips

  mysql:
    image: mysql:8.0
    container_name: eskytrips_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ecommerce_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - eskytrips

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eskytrips_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_started
    networks:
      - eskytrips

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eskytrips_scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_started
    networks:
      - eskytrips

networks:
  eskytrips:
    driver: bridge

volumes:
  mysql_data:
  storage:
  bootstrap_cache:
