services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eskytrips_app
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    ports:
      - "20080:80"
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - eskytrips

  mysql:
    image: mysql:8.0
    container_name: eskytrips_mysql
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - eskytrips
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eskytrips_queue
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eskytrips

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eskytrips_scheduler
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eskytrips

networks:
  eskytrips:
    driver: bridge

volumes:
  mysql_data:
