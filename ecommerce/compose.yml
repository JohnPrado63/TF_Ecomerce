services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eskytrips_app
    restart: unless-stopped
    ports:
      - "20180:8080"
    volumes:
      - storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health.php"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - eskytrips

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eskytrips_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    networks:
      - eskytrips

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eskytrips_scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    networks:
      - eskytrips

networks:
  eskytrips:
    driver: bridge

volumes:
  storage:
  bootstrap_cache:
